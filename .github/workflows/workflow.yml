name: Crypto Monitor (manuální záloha)

# Cron job běží na Fly.io (Frankfurt EU).
# Tento workflow slouží jen pro manuální spuštění z GitHub UI.
on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests feedparser beautifulsoup4

      - name: Spusť monitor
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          COINMARKETCAP_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          LINEAR_API_KEY:        ${{ secrets.LINEAR_API_KEY }}
        run: python crypto_monitor.py
