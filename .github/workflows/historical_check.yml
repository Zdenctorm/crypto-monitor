name: Historická kontrola (jednorázová)

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Počet dní zpětně (výchozí: 30)"
        required: false
        default: "30"

jobs:
  historical-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaluj závislosti
        run: pip install requests feedparser

      - name: Spusť historickou kontrolu
        env:
          CRYPTOPANIC_API_KEY:   ${{ secrets.CRYPTOPANIC_API_KEY }}
          COINMARKETCAP_API_KEY: ${{ secrets.COINMARKETCAP_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python historical_check.py ${{ github.event.inputs.days }} | tee historical_check.log

      - name: Ulož výsledky jako artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-check-${{ github.run_id }}
          path: "historical_check.log"
          retention-days: 30
